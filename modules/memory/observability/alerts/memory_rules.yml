groups:
- name: memory-service-alerts
  rules:
  - alert: MemorySearchLatencyHighP95
    expr: histogram_quantile(0.95, sum(rate(memory_search_latency_ms_bucket[5m])) by (le)) > 300
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Memory search P95 latency high"
      description: "P95 latency over 300ms for 5m"

  - alert: MemoryErrorsSpike
    expr: increase(memory_errors_total[10m]) > 20
    for: 10m
    labels:
      severity: critical
    annotations:
      summary: "Memory errors increased"
      description: "More than 20 errors in 10 minutes"

  - alert: CircuitBreakerOpenSpike
    expr: increase(memory_circuit_breaker_open_total[10m]) > 3
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "Circuit breaker openings increased"
      description: "More than 3 circuit opens in 10 minutes"

