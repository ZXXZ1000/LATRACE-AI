# Example Nginx ingress for MOYAN Memory Service (production posture)
# - Enforces TLS and CORS allowlist
# - Applies request size cap and per-tenant rate limits (token-based)
# - Forwards to upstream FastAPI service on http://memory:8000

worker_processes auto;

http {
  log_format json_combined '{"ts":"$time_iso8601","remote_addr":"$remote_addr","req":"$request",'
                            '"status":$status,"bytes":$body_bytes_sent,"referer":"$http_referer",'
                            '"ua":"$http_user_agent","req_id":"$request_id","upstream":"$upstream_addr"}';
  access_log /var/log/nginx/access.log json_combined;
  error_log /var/log/nginx/error.log warn;

  map $http_x_api_token $mem_rate_key {
    default $http_x_api_token;
  }

  limit_req_zone $mem_rate_key zone=mem_api:10m rate=10r/s; # tune to match app limits
  limit_conn_zone $mem_rate_key zone=mem_conn:10m;          # per-tenant concurrent connections

  server {
    listen 443 ssl http2;
    server_name memory.example.com;

    ssl_certificate     /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;

    # CORS allowlist
    set $cors_origin "";
    if ($http_origin ~* "^https?://(app\\.example\\.com)$") {
      set $cors_origin $http_origin;
    }

    add_header Access-Control-Allow-Origin $cors_origin;
    add_header Access-Control-Allow-Methods "GET,POST,OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type,X-API-Token,X-Tenant-ID";
    add_header Access-Control-Allow-Credentials "true";

    client_max_body_size 10m;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;

    location / {
      if ($request_method = OPTIONS) {
        add_header Content-Length 0;
        return 204;
      }

      limit_req zone=mem_api burst=20 nodelay;
      limit_conn mem_conn 50;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://memory:8000;
    }
  }
}
